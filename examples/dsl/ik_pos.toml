    type = "sub"

    [terms.expr.a]
    type = "get_state"
    name = "ee_pos"

    [terms.expr.a.key]
    k = 0
    owner_type = "link"
    owner_name = "ee"
    dtype = "kinematics"
    field = "pos"
    frame = "world"

    [terms.expr.a.jac]
    var = "q"

    [terms.expr.b]
    type = "const"
    var = "q"
    name = "target_pos"
    value = [1.5, 0.5, 0.0]

    [terms.cost]
    type = "l2"

[[terms]]
    [terms.expr]
    type = "sub"

    [terms.expr.a]
    type = "get_var"
    name = "joint_q"
    var = "q"

    [terms.expr.b]
    type = "const"
    var = "q"
    name = "q_nom"
    value = [0.0, 0.0]

    [terms.cost]
    type = "scalar_weight"
    w = 1e-6
