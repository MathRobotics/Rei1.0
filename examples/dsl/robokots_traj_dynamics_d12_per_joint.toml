[time]
N = 20
dt = 0.1

[trajectory]
type = "bspline"
var = "p"
degree = 4
num_ctrl_points = 8

[[variables]]
name = "p"
init = { fill = 0.0 }

# NOTE:
# - This file is a per-joint version for planar2 (q_dim=2).
# - Each term is split into j0 / j1 by wrapping the original expression
#   with `type = "component"`.

[[terms]]
[terms.constraint]
kind = "eq"

[terms.attrs]
joint_component = 0
nullspace_eq = true

[terms.expr]
type = "component"
name = "q_init_j0"
segment_dim = 2
index = 0

[terms.expr.base]
type = "sub"
name = "q_init"

[terms.expr.base.a]
type = "get_state"
name = "joint_q_init"

[terms.expr.base.a.key]
k = 0
owner_type = "total_joint"
owner_name = "robot"
dtype = "coord"
field = "q"

[terms.expr.base.a.jac]
var = "p"

[terms.expr.base.b]
type = "const"
var = "p"
name = "target_q_init"
value = [1.57, 0.0]

[terms.cost]
type = "scalar_weight"
w = 100.0

