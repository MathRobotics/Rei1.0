[time]
N = 10
dt = 0.1

[trajectory]
type = "bspline"
var = "p"
degree = 3
num_ctrl_points = 6

[[variables]]
name = "p"
init = { fill = 0.0 }

[[terms]]
  [terms.expr]
  type = "sub"
  name = "task_init_joint_q"

  [terms.expr.a]
  type = "get_state"
  name = "joint_q_init"

  [terms.expr.a.key]
  k = "first"
  owner_type = "total_joint"
  owner_name = "robot"
  dtype = "coord"
  field = "q"

  [terms.expr.a.jac]
  var = "p"

  [terms.expr.b]
  type = "const"
  var = "p"
  name = "target_q_init"
  value = [1.57, 0.0]

  [terms.cost]
  type = "scalar_weight"
  w = 1.0

[[terms]]
  [terms.expr]
  type = "sub"
  name = "task_terminal_joint_q"

  [terms.expr.a]
  type = "get_state"
  name = "joint_q_terminal"

  [terms.expr.a.key]
  k = "last"
  owner_type = "total_joint"
  owner_name = "robot"
  dtype = "coord"
  field = "q"

  [terms.expr.a.jac]
  var = "p"

  [terms.expr.b]
  type = "const"
  var = "p"
  name = "target_q_terminal"
  value = [-1.57, 0.0]

  [terms.cost]
  type = "scalar_weight"
  w = 1.0

[[terms]]
  [terms.expr]
  type = "hinge"
  name = "q_upper_limit_hinge"

  [terms.expr.base]
  type = "sub"

  [terms.expr.base.a]
  type = "get_traj_var"
  name = "q_traj_for_upper"
  var = "p"

  [terms.expr.base.b]
  type = "const_repeat"
  var = "p"
  name = "q_max_traj"
  value = { fill = 3.141592653589793 }

  [terms.cost]
  type = "scalar_weight"
  w = 1e-2

[[terms]]
  [terms.expr]
  type = "hinge"
  name = "q_lower_limit_hinge"

  [terms.expr.base]
  type = "sub"

  [terms.expr.base.a]
  type = "const_repeat"
  var = "p"
  name = "q_min_traj"
  value = { fill = -3.141592653589793 }

  [terms.expr.base.b]
  type = "get_traj_var"
  name = "q_traj_for_lower"
  var = "p"

  [terms.cost]
  type = "scalar_weight"
  w = 1e-2

[[terms]]
  [terms.expr]
  type = "sub"
  name = "task_init_joint_qdot"

  [terms.expr.a]
  type = "get_traj_var"
  name = "joint_qdot_init"
  var = "p"
  derivative_order = 1
  derivative_wrt = "time"
  k = 0

  [terms.expr.b]
  type = "const"
  var = "p"
  name = "target_qdot_init"
  value = { fill = 0.0 }

  [terms.cost]
  type = "l2"

[[terms]]
  [terms.expr]
  type = "sub"
  name = "task_terminal_joint_qdot"

  [terms.expr.a]
  type = "get_traj_var"
  name = "joint_qdot_terminal"
  var = "p"
  derivative_order = 1
  derivative_wrt = "time"
  k = "last"

  [terms.expr.b]
  type = "const"
  var = "p"
  name = "target_qdot_terminal"
  value = { fill = 0.0 }

  [terms.cost]
  type = "l2"

[[terms]]
  [terms.expr]
  type = "get_traj_var"
  name = "qdot_traj_regularization"
  var = "p"
  derivative_order = 1
  derivative_wrt = "time"

  [terms.cost]
  type = "scalar_weight"
  w = 1e-3
